<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width,
    initial-scale=1.0">
    <title>css grid</title>
    <link rel="stylesheet"
    href="grid.css">
</head>
<body>

    <h1>Demo css grid</h1>
    <!-- Grid 3 kolom sama rata-->
     <section class="grid-dasar">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>Item 4</div>
        <div>Item 5</div>
        <div>Item 6</div>
     </section>

     <!--Grid 12 kolom layout-->
     <section class="Layout-halam">
        <header class="L-header">
        Header</header>
        <nav class="L-sidebar">L-sidebar</nav>
        <main class="Lkonten">
            konten utama </main>
            <aside class="L-aside">
                aside</aside>
                <footer class="L-footer">
                Footer</footer>
     </section>

     <!-- Grid responsif otomatis-->
      <section class="grid-auto">
       <div>A</div><div>B</div> 
       <div>C<div><div>D</div>
       <div>E</div><div>F</div>
       <div>G</div><div>H</div>
      </section>

      <!-- Galeri dengan item spesial-->
       <section class="Galeri">
        <div class="g-besar">
            Foto utama
            </div>
            <div>Foto 2</div>
            <div>Foto 3</div>
            <div>Foto 4</div>
            <div class="g-lebar">
                Banner panjang
            </div>
            <div>Foto 6</div>
       </section>
    </body>
    </html>
